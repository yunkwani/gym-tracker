<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description"
        content="Aplicación para gestionar tus rutinas de gimnasio. Registra tus entrenamientos, ejercicios, series y repeticiones.">
    <meta name="theme-color" content="#0f0f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GymTracker — Tu Rutina de Gimnasio</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏋️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Splash / Header -->
    <header id="app-header">
        <div class="header-content">
            <h1 id="header-title">GymTracker</h1>
            <button id="header-action-btn" class="header-btn hidden" aria-label="Acción">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19" />
                    <line x1="5" y1="12" x2="19" y2="12" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-main">
        <!-- ========== VISTA: RUTINAS ========== -->
        <section id="view-routines" class="view active">
            <div id="routines-list" class="card-list">
                <!-- Populated by JS -->
            </div>
            <div id="empty-routines" class="empty-state">
                <div class="empty-icon">📋</div>
                <p>No tienes rutinas todavía</p>
                <button class="btn btn-primary" onclick="app.showCreateRoutine()">Crear mi primera rutina</button>
            </div>
        </section>

        <!-- ========== VISTA: CREAR/EDITAR RUTINA ========== -->
        <section id="view-edit-routine" class="view">
            <form id="routine-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="routine-name">Nombre de la rutina</label>
                    <input type="text" id="routine-name" placeholder="Ej: Push Day, Pierna..." required>
                </div>
                <div class="form-group">
                    <label>Ejercicios</label>
                    <div id="routine-exercises-list" class="exercise-chips">
                        <!-- Populated by JS -->
                    </div>
                    <button type="button" class="btn btn-outline btn-sm" onclick="app.showExercisePicker()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        Añadir ejercicio
                    </button>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-ghost" onclick="app.cancelEditRoutine()">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="app.saveRoutine()">Guardar rutina</button>
                </div>
            </form>
        </section>

        <!-- ========== VISTA: SELECTOR DE EJERCICIOS ========== -->
        <section id="view-exercise-picker" class="view">
            <div class="search-bar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" id="exercise-search" placeholder="Buscar ejercicio..."
                    oninput="app.filterExercises(this.value)">
            </div>
            <div id="exercise-catalog" class="exercise-catalog">
                <!-- Populated by JS -->
            </div>
            <div class="form-actions sticky-bottom">
                <button type="button" class="btn btn-ghost" onclick="app.closeExercisePicker()">Cancelar</button>
                <button type="button" class="btn btn-primary" onclick="app.confirmExercisePicker()">Confirmar</button>
            </div>
        </section>

        <!-- ========== VISTA: ENTRENAR ========== -->
        <section id="view-train" class="view">
            <div id="train-select" class="train-select">
                <div class="section-title">Elige una rutina para entrenar</div>
                <div id="train-routines-list" class="card-list">
                    <!-- Populated by JS -->
                </div>
                <div id="empty-train" class="empty-state">
                    <div class="empty-icon">🏋️</div>
                    <p>Crea una rutina primero</p>
                </div>
            </div>
            <div id="train-active" class="train-active hidden">
                <div class="workout-header-bar">
                    <div>
                        <div class="workout-routine-name" id="workout-routine-name"></div>
                        <div class="workout-timer" id="workout-elapsed">00:00</div>
                    </div>
                    <button class="btn btn-danger btn-sm" onclick="app.finishWorkout()">Terminar</button>
                </div>
                <div id="workout-exercises" class="workout-exercises">
                    <!-- Populated by JS -->
                </div>
            </div>
        </section>

        <!-- ========== VISTA: HISTORIAL ========== -->
        <section id="view-history" class="view">
            <div id="history-list" class="card-list">
                <!-- Populated by JS -->
            </div>
            <div id="empty-history" class="empty-state">
                <div class="empty-icon">📊</div>
                <p>Aún no has completado entrenamientos</p>
            </div>
        </section>

        <!-- ========== VISTA: DETALLE HISTORIAL ========== -->
        <section id="view-history-detail" class="view">
            <div id="history-detail-content" class="history-detail">
                <!-- Populated by JS -->
            </div>
        </section>
    </main>

    <!-- Rest Timer Modal -->
    <div id="rest-timer-modal" class="modal hidden">
        <div class="modal-backdrop" onclick="app.closeRestTimer()"></div>
        <div class="modal-content glass-card">
            <div class="timer-display">
                <svg id="timer-ring" width="200" height="200" viewBox="0 0 200 200">
                    <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8" />
                    <circle id="timer-progress" cx="100" cy="100" r="90" fill="none" stroke="url(#timer-gradient)"
                        stroke-width="8" stroke-linecap="round" stroke-dasharray="565.48" stroke-dashoffset="0"
                        transform="rotate(-90 100 100)" />
                    <defs>
                        <linearGradient id="timer-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#6366f1" />
                            <stop offset="100%" style="stop-color:#a855f7" />
                        </linearGradient>
                    </defs>
                </svg>
                <div class="timer-text" id="timer-text">01:30</div>
            </div>
            <div class="timer-presets">
                <button class="btn btn-outline btn-sm" onclick="app.setRestTime(30)">0:30</button>
                <button class="btn btn-outline btn-sm" onclick="app.setRestTime(60)">1:00</button>
                <button class="btn btn-outline btn-sm" onclick="app.setRestTime(90)">1:30</button>
                <button class="btn btn-outline btn-sm" onclick="app.setRestTime(120)">2:00</button>
                <button class="btn btn-outline btn-sm" onclick="app.setRestTime(180)">3:00</button>
            </div>
            <div class="timer-actions">
                <button class="btn btn-primary btn-lg" id="timer-start-btn"
                    onclick="app.toggleRestTimer()">Iniciar</button>
                <button class="btn btn-ghost" onclick="app.closeRestTimer()">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="modal hidden">
        <div class="modal-backdrop" onclick="app.cancelConfirm()"></div>
        <div class="modal-content glass-card" style="padding: 28px;">
            <p id="confirm-message" style="font-size: 1rem; font-weight: 600; margin-bottom: 24px;"></p>
            <div style="display: flex; gap: 12px;">
                <button class="btn btn-ghost" style="flex:1;" onclick="app.cancelConfirm()">Cancelar</button>
                <button class="btn btn-primary" style="flex:1;" id="confirm-ok-btn"
                    onclick="app.acceptConfirm()">Aceptar</button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav">
        <button class="nav-item active" data-view="routines" onclick="app.navigate('routines')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="1" />
                <rect x="14" y="3" width="7" height="7" rx="1" />
                <rect x="3" y="14" width="7" height="7" rx="1" />
                <rect x="14" y="14" width="7" height="7" rx="1" />
            </svg>
            <span>Rutinas</span>
        </button>
        <button class="nav-item" data-view="train" onclick="app.navigate('train')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path
                    d="M6.5 6.5h11M6.5 17.5h11M4 10h1.5M4 14h1.5M18.5 10H20M18.5 14H20M6.5 6.5v11M17.5 6.5v11M6.5 10h11M6.5 14h11" />
            </svg>
            <span>Entrenar</span>
        </button>
        <button class="nav-item" data-view="history" onclick="app.navigate('history')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
            </svg>
            <span>Historial</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>

</html>
